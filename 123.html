<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استخراج هوشمند اطلاعات محصول</title>
    <style>
        body {
            font-family: Tahoma, Geneva, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            background: #ffffff;
            margin: 30px auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        h2 {
            color: #0071dc;
            text-align: center;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            direction: ltr;
        }
        button {
            background-color: #0071dc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
        }
        button:hover {
            background-color: #0050a0;
        }
        .loading {
            text-align: center;
            color: #666;
            display: none;
            margin: 15px 0;
        }
        .result-box {
            display: none;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            background: #fafafa;
            text-align: center;
        }
        .product-image {
            max-width: 220px;
            max-height: 220px;
            display: block;
            margin: 0 auto 15px auto;
            border-radius: 8px;
            border: 1px solid #ddd;
            object-fit: contain;
        }
        .product-title {
            font-size: 18px;
            font-weight: bold;
            color: #111;
            margin-bottom: 15px;
        }
        .product-link {
            display: inline-block;
            background-color: #ffc220;
            color: #000;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
        }
        .product-link:hover {
            background-color: #e5ad1c;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>استخراج هوشمند محصول از Walmart</h2>
    
    <div class="input-group">
        <input type="text" id="walmartUrl" value="https://www.walmart.ca/en/search?q=6000205460099">
        <button id="fetchBtn">یافتن محصول</button>
    </div>

    <div class="loading" id="loader">در حال دریافت و آنالیز صفحه محصول...</div>

    <div class="result-box" id="resultCard">
        <img id="pImg" class="product-image" src="" alt="تصویر محصول">
        <div class="product-title" id="pTitle">عنوان محصول</div>
        <div>
            <a id="pLink" class="product-link" href="#" target="_blank">مشاهده و خرید محصول</a>
        </div>
    </div>
</div>

<script>
document.getElementById("fetchBtn").addEventListener("click", async function() {
    const urlInput = document.getElementById("walmartUrl");
    const loader = document.getElementById("loader");
    const resultCard = document.getElementById("resultCard");
    
    const url = urlInput.value.trim();
    
    if (!url) {
        alert("لطفا یک لینک معتبر وارد کنید.");
        return;
    }

    resultCard.style.display = "none";
    loader.style.display = "block";

    // تلاش برای استخراج کد محصول (مثلا 6000205460099) از داخل لینک ورودی کاربر
    let itemId = "";
    try {
        const urlObj = new URL(url);
        itemId = urlObj.searchParams.get("q") || "";
    } catch(e) {
        console.log("آدرس وارد شده استاندارد نیست اما به تلاش ادامه می‌دهیم.");
    }

    // فرستادن درخواست به وال‌مارت از طریق پروکسی امن
    const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(url);

    try {
        const response = await fetch(proxyUrl);
        if (!response.ok) {
            throw new Error("سایت مبدا با پروکسی همکاری نکرد.");
        }
        
        const htmlContent = await response.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlContent, "text/html");

        // ۱. پیدا کردن تگ لینک محصول بر اساس شناسه محصول یا الگوهای ساختار ارسالی شما
        let linkSelector = "a[link-identifier]";
        if (itemId) {
            linkSelector = "a[link-identifier='" + itemId + "']";
        }
        let linkElement = doc.querySelector(linkSelector) || doc.querySelector("a[href*='/ip/']");

        if (linkElement) {
            // ۲. استخراج دقیق عنوان (طبق تگ کپی شده شما اولویت با data-automation-id="product-title" است)
            let title = "عنوان یافت نشد";
            const titleSpan = doc.querySelector("[data-automation-id='product-title']") || 
                              linkElement.querySelector("span.ld_Ec") || 
                              linkElement.querySelector("span");
            
            if (titleSpan) {
                title = titleSpan.textContent.trim();
            }

            // ۳. استخراج آدرس لینک خرید
            let href = linkElement.getAttribute("href") || "";
            let fullLink = href;
            if (!href.startsWith("http")) {
                fullLink = "https://www.walmart.ca" + href;
            }

            // ۴. استخراج تصویر با تگ اختصاصی شما: data-testid="productTileImage"
            let imgSrc = "";
            const imgElement = doc.querySelector("img[data-testid='productTileImage']") || 
                               doc.querySelector("img[id*='productImage']") || 
                               linkElement.querySelector("img");
            
            if (imgElement) {
                imgSrc = imgElement.getAttribute("src") || imgElement.getAttribute("data-src");
            }

            // قرار دادن مقادیر استخراج شده در کارت نتیجه فرانت‌اند
            const pImg = document.getElementById("pImg");
            if (imgSrc) {
                pImg.src = imgSrc;
                pImg.style.display = "block";
            } else {
                pImg.style.display = "none";
            }

            document.getElementById("pTitle").innerText = title;
            document.getElementById("pLink").href = fullLink;

            loader.style.display = "none";
            resultCard.style.display = "block";
        } else {
            loader.style.display = "none";
            alert("ساختار تگ محصول در کدهای این صفحه یافت نشد. ممکن است صفحه وال‌مارت هنوز به طور کامل بارگذاری نشده باشد.");
        }
    } catch (error) {
        console.error(error);
        loader.style.display = "none";
        alert("خطا در ارتباط با سرور یا مسدود شدن درخواست.");
    }
});
</script>

</body>
</html>
