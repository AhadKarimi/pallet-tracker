<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استخراج‌کننده تصاویر والمارت</title>
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: 0 auto;
        }
        h1 {
            color: #0071dc; /* رنگ برند والمارت */
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 80%;
            padding: 12px;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #0071dc;
        }
        button {
            padding: 12px 25px;
            background-color: #ffc220; /* زرد والمارت */
            color: #333;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #e5ad1c;
        }
        .status {
            margin-top: 15px;
            font-weight: bold;
            color: #555;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .img-card {
            background: #fdfdfd;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .img-card:hover {
            transform: scale(1.03);
        }
        .img-card img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            display: block;
            margin: 0 auto;
        }
        .img-card a {
            display: block;
            margin-top: 10px;
            font-size: 12px;
            color: #0071dc;
            text-decoration: none;
            word-break: break-all;
        }
        .img-card a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>استخراج تصاویر محصولات Walmart</h1>
    <p>لینک جستجو یا لینک مستقیم محصول والمارت را در کادر زیر وارد کنید:</p>
    
    <input type="text" id="walmartUrl" placeholder="https://www.walmart.ca/en/search?q=..." value="https://www.walmart.ca/en/search?q=6000205460099">
    <br>
    <button onclick="extractImages()">استخراج تصاویر</button>
    
    <div id="status" class="status"></div>
    <div id="gallery" class="gallery"></div>
</div>

<script>
async function extractImages() {
    const urlInput = document.getElementById('walmartUrl').value.trim();
    const statusDiv = document.getElementById('status');
    const galleryDiv = document.getElementById('gallery');
    
    // پاک کردن نتایج قبلی
    galleryDiv.innerHTML = '';
    
    if (!urlInput) {
        statusDiv.innerHTML = '<span style="color: red;">لطفاً یک لینک معتبر وارد کنید.</span>';
        return;
    }

    statusDiv.innerHTML = 'در حال ارتباط با سرور و دریافت اطلاعات صفحه...';

    // استفاده از پروکسی AllOrigins برای دور زدن محدودیت CORS مرورگر
    const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(urlInput);

    try {
        const response = await fetch(proxyUrl);
        if (!response.ok) {
            throw new Error('عدم دریافت پاسخ مناسب از پروکسی.');
        }
        
        const data = await response.json();
        const htmlContent = data.contents; // محتوای HTML صفحه اصلی والمارت
        
        // ایجاد یک سند مجازی برای پارس کردن HTML
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlContent, 'text/html');
        
        // پیدا کردن تگ‌های تصویر مرتبط با فرمت تصاویر والمارت
        const imgTags = doc.querySelectorAll('img');
        const imageUrls = new Set(); // استفاده از Set برای جلوگیری از تصاویر تکراری

        imgTags.forEach(img => {
            const src = img.getAttribute('src') || '';
            const srcset = img.getAttribute('srcset') || '';
            const dataSrc = img.getAttribute('data-src') || '';

            // بررسی آدرس‌ها برای مطابقت با دامنه تصاویر والمارت
            [src, dataSrc, ...srcset.split(' ')].forEach(url => {
                if (url && (url.includes('walmartimages.ca') || url.includes('walmartimages.com'))) {
                    // تمیزکاری آدرس‌ها (حذف کوئری‌های سایزبندی غیرضروری در صورت نیاز)
                    let cleanUrl = url.trim();
                    if (cleanUrl.startsWith('//')) {
                        cleanUrl = 'https:' + cleanUrl;
                    }
                    // فیلتر کردن تصاویر بسیار کوچک یا آیکون‌ها
                    if (cleanUrl.includes('/images/') && !cleanUrl.includes('sprite') && cleanUrl.startsWith('http')) {
                        imageUrls.add(cleanUrl);
                    }
                }
            });
        });

        // نمایش تصاویر پیدا شده
        if (imageUrls.size === 0) {
            statusDiv.innerHTML = '<span style="color: orange;">تصویری با این مشخصات در صفحه یافت نشد. ممکن است ساختار صفحه تغییر کرده باشد یا آی‌پی شما بلاک شده باشد.</span>';
            return;
        }

        statusDiv.innerHTML = `موفقیت‌آمیز! تعداد <span style="color: green;">${imageUrls.size}</span> تصویر پیدا شد.`;

        imageUrls.forEach(url => {
            const card = document.createElement('div');
            card.className = 'img-card';

            const img = document.createElement('img');
            img.src = url;
            img.alt = "Walmart Image";

            const link = document.createElement('a');
            link.href = url;
            link.target = "_blank";
            link.innerText = "مشاهده سایز اصلی تصویر";

            card.appendChild(img);
            card.appendChild(link);
            galleryDiv.appendChild(card);
        });

    } catch (error) {
        console.error(error);
        statusDiv.innerHTML = '<span style="color: red;">خطایی در دریافت اطلاعات رخ داد. لطفاً چند لحظه دیگر دوباره تلاش کنید.</span>';
    }
}
</script>

</body>
</html>
