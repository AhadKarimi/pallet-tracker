<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استخراج خودکار اطلاعات محصول از لینک</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 650px;
            background: #ffffff;
            margin: 30px auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        h2 {
            color: #0071dc;
            text-align: center;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            direction: ltr;
        }
        button {
            background-color: #0071dc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0050a0;
        }
        .loading {
            text-align: center;
            color: #666;
            display: none;
            margin: 15px 0;
        }
        .result-box {
            display: none;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            background: #fafafa;
        }
        .product-image {
            max-width: 150px;
            max-height: 150px;
            display: block;
            margin: 0 auto 15px auto;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .product-title {
            font-size: 18px;
            font-weight: bold;
            color: #111;
            margin-bottom: 15px;
            text-align: center;
        }
        .product-link {
            display: block;
            background-color: #ffc220;
            color: #000;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 4px;
            font-weight: bold;
            text-align: center;
            margin: 0 auto;
            max-width: 280px;
        }
        .product-link:hover {
            background-color: #e5ad1c;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>استخراج خودکار محصول از Walmart</h2>
    <p style="text-align: center; font-size: 13px; color: #666;">کافیست لینک جستجو یا صفحه محصول وال‌مارت کانادا را وارد کنید:</p>
    
    <div class="input-group">
        <input type="text" id="walmartUrl" value="https://www.walmart.ca/en/search?q=6000205460099" placeholder="https://www.walmart.ca/en/search?q=...">
        <button id="fetchBtn">یافتن محصول</button>
    </div>

    <div class="loading" id="loader">در حال دریافت و تحلیل اطلاعات... لطفاً منتظر بمانید.</div>

    <div class="result-box" id="resultCard">
        <img id="pImg" class="product-image" src="" alt="تصویر محصول" style="display: none;">
        <div class="product-title" id="pTitle">عنوان محصول</div>
        <div style="text-align: center;">
            <a id="pLink" class="product-link" href="#" target="_blank">مشاهده محصول در سایت وال‌مارت</a>
        </div>
    </div>
</div>

<script>
// استفاده از Event Listener به جای onclick مستقیم در HTML برای پایداری بیشتر کد
document.getElementById('fetchBtn').addEventListener('click', async function() {
    const url = document.getElementById('walmartUrl').value.trim();
    const loader = document.getElementById('loader');
    const resultCard = document.getElementById('resultCard');
    
    if (!url) {
        alert('لطفا یک لینک معتبر وارد کنید.');
        return;
    }

    resultCard.style.display = 'none';
    loader.style.display = 'block';

    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

    try {
        const response = await fetch(proxyUrl);
        if (!response.ok) {
            throw new Error('شبکه پاسخگو نبود.');
        }
        
        const data = await response.json();
        const htmlContent = data.contents;

        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlContent, 'text/html');

        const linkElement = doc.querySelector('a[link-identifier]') || doc.querySelector('a[href*="/ip/"]');

        if (linkElement) {
            const titleSpan = linkElement.querySelector('span.ld_Ec') || linkElement.querySelector('span');
            let title = "عنوان یافت نشد";
            if (titleSpan) {
                title = titleSpan.innerHTML.replace(//g, "").trim();
            }

            let relativeHref = linkElement.getAttribute('href');
            let absoluteHref = relativeHref.startsWith('http') ? relativeHref : 'https://www.walmart.ca' + relativeHref;

            const imgElement = linkElement.querySelector('img') || doc.querySelector(`img[alt*="${title.substring(0,10)}"]`);
            const pImg = document.getElementById('pImg');
            
            if (imgElement && imgElement.getAttribute('src')) {
                pImg.src = imgElement.getAttribute('src');
                pImg.style.display = 'block';
            } else {
                pImg.style.display = 'none';
            }

            document.getElementById('pTitle').innerText = title;
            document.getElementById('pLink').href = absoluteHref;

            loader.style.display = 'none';
            resultCard.style.display = 'block';
        } else {
            loader.style.display = 'none';
            alert('المان محصول در صفحه پیدا نشد. احتمالاً ساختار صفحه یا سیستم امنیتی وال‌مارت دسترسی پروکسی را محدود کرده است.');
        }

    } catch (error) {
        console.error(error);
        loader.style.display = 'none';
        alert('خطایی در ارتباط با سرور رخ داد. دوباره تلاش کنید.');
    }
});
</script>

</body>
</html>
