<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>استخراج اطلاعات محصول</title>
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 20px;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin: 0 auto;
        }
        textarea {
            width: 100%;
            height: 120px;
            margin-bottom: 15px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #0071dc; /* رنگ آبی والمارتی */
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            width: 100%;
        }
        button:hover {
            background-color: #0050a0;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-top: 2px dashed #0071dc;
        }
        .product-title {
            font-weight: bold;
            font-size: 18px;
            color: #333;
        }
        .product-link {
            color: #0071dc;
            word-break: break-all;
            display: block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>استخراج اطلاعات از کدهای HTML کپی شده</h2>
    <p>کد HTML کپی شده از بخش Inspect Element را در کادر زیر قرار دهید:</p>
    
    <textarea id="htmlInput" placeholder='کد HTML را اینجا وارد کنید. مثلاً: <a href="..." ...><span class="ld_Ec">Green House...</span></a>'></textarea>
    <button onclick="extractData()">استخراج اطلاعات</button>

    <div class="result" id="resultArea" style="display: none;">
        <h3>نتیجه استخراج:</h3>
        <p><strong>عنوان محصول:</strong> <span id="extractedTitle">-</span></p>
        <p><strong>لینک محصول:</strong> <a id="extractedLink" class="product-link" href="#" target="_blank">-</a></p>
    </div>
</div>

<script>
function extractData() {
    const rawHtml = document.getElementById('htmlInput').value;
    if (!rawHtml.trim()) {
        alert('لطفاً ابتدا کد HTML را وارد کنید.');
        return;
    }

    // ایجاد یک المان موقت برای پارس کردن HTML
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = rawHtml;

    // پیدا کردن تگ a و span درون آن
    const linkElement = tempDiv.querySelector('a');
    const titleElement = tempDiv.querySelector('.ld_Ec') || tempDiv.querySelector('span');

    if (linkElement && titleElement) {
        // استخراج متن عنوان و حذف کامنت‌های احتمالی HTML
        let titleText = titleElement.innerHTML.replace(//g, "").trim();
        
        // استخراج لینک
        let href = linkElement.getAttribute('href');
        let fullLink = href.startsWith('http') ? href : 'https://www.walmart.ca' + href;

        // نمایش نتایج
        document.getElementById('extractedTitle').innerText = titleText;
        document.getElementById('extractedLink').href = fullLink;
        document.getElementById('extractedLink').innerText = fullLink;
        
        document.getElementById('resultArea').style.display = 'block';
    } else {
        alert('ساختار کد وارد شده خوانا نیست یا تگ‌های موردنظر پیدا نشدند.');
    }
}
</script>

</body>
</html>
