<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نمایشگر داینامیک تصاویر والمارت</title>
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        input[type="text"] {
            width: 15%;
            width: -webkit-fill-available;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            text-align: left;
            direction: ltr;
        }
        button {
            background-color: #0071dc; /* رنگ برند والمارت */
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #00509e;
        }
        .image-container {
            margin-top: 30px;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 10px;
            background: #fafafa;
        }
        img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 4px;
            display: none;
        }
        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0071dc;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        .error-msg {
            color: #d93025;
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>استخراج و نمایش تصویر محصول والمارت</h2>
    <p>لینک صفحه محصول یا لینک جستجوی والمارت کانادا را وارد کنید:</p>
    
    <input type="text" id="walmart-url" placeholder="https://www.walmart.ca/en/ip/..." value="https://www.walmart.ca/en/search?q=6000205460099">
    <button onclick="fetchWalmartImage()">یافتن عکس</button>

    <div class="image-container">
        <div class="loader" id="loader"></div>
        <div class="error-msg" id="error-msg">خطایی در دریافت اطلاعات رخ داد. ممکن است محدودیت CORS یا بلاک آی‌پی پیش آمده باشد.</div>
        <img id="product-img" src="" alt="تصویر محصول">
    </div>
</div>

<script>
async function fetchWalmartImage() {
    const urlInput = document.getElementById('walmart-url').value.trim();
    const loader = document.getElementById('loader');
    const imgElement = document.getElementById('product-img');
    const errorMsg = document.getElementById('error-msg');

    if (!urlInput) {
        alert('لطفاً ابتدا یک لینک معتبر وارد کنید.');
        return;
    }

    // ریست کردن وضعیت نمایشگرها
    loader.style.display = 'block';
    imgElement.style.display = 'none';
    errorMsg.style.display = 'none';

    // استفاده از یک پروکسی عمومی CORS برای دور زدن محدودیت‌های مرورگر
    // توجه: پروکسی‌های عمومی ممکن است گاهی کند باشند یا تحت ترافیک شدید کار نکنند.
    const corsProxy = "https://api.allorigins.win/get?url=";
    const targetUrl = encodeURIComponent(urlInput);

    try {
        const response = await fetch(`${corsProxy}${targetUrl}`);
        if (!response.ok) throw new Error('Network response was not ok');
        
        const data = await response.json();
        const htmlText = data.contents;

        // ایجاد یک المنت موقت برای پارس راحت‌تر HTML
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, 'text/html');

        let imageUrl = '';

        // روش اول: گشتن به دنبال تگ اسکریپت __NEXT_DATA__ که اطلاعات اولیه والمارت را دارد
        const nextDataScript = doc.getElementById('__NEXT_DATA__');
        if (nextDataScript) {
            try {
                const jsonData = JSON.parse(nextDataScript.textContent);
                // تلاش برای استخراج عکس اول از اطلاعات کامپوننت‌ها یا جستجوها
                const itemStacks = jsonData.props?.pageProps?.initialData?.searchResult?.itemStacks;
                if (itemStacks && itemStacks[0]?.items?.[0]?.imageInfo?.thumbnailUrl) {
                    imageUrl = itemStacks[0].items[0].imageInfo.thumbnailUrl;
                } else {
                    // تلاش برای گرفتن عکس در صفحات مستقیم محصول (Product page)
                    const productData = jsonData.props?.pageProps?.initialData?.data?.product;
                    if (productData?.imageInfo?.thumbnailUrl) {
                        imageUrl = productData.imageInfo.thumbnailUrl;
                    }
                }
            } catch (e) {
                console.log("خطا در پارس جی‌سان NEXT_DATA:", e);
            }
        }

        // روش دوم کمکی: اگر از روش بالا عکسی پیدا نشد، تگ‌های تصویر سنتی یا متا تگ‌ها را جستجو می‌کنیم
        if (!imageUrl) {
            const metaOgImage = doc.querySelector('meta[property="og:image"]');
            if (metaOgImage) {
                imageUrl = metaOgImage.getAttribute('content');
            }
        }

        // روش سوم کمکی: جستجوی مستقیم در تگ‌های img موجود در صفحه
        if (!imageUrl) {
            const images = doc.querySelectorAll('img');
            for (let img of images) {
                const src = img.getAttribute('src') || '';
                if (src.includes('walmartimages.ca') || src.includes('walmartimages.com')) {
                    imageUrl = src;
                    break;
                }
            }
        }

        if (imageUrl) {
            // بهینه‌سازی سایز عکس والمارت (جایگزینی ابعاد برای تصویر بزرگتر در صورت لزوم)
            if (imageUrl.includes('odnHeight=') || imageUrl.includes('odnWidth=')) {
                imageUrl = imageUrl.replace(/odnHeight=\d+/, 'odnHeight=580').replace(/odnWidth=\d+/, 'odnWidth=580');
            }
            
            // نمایش عکس استخراج شده
            imgElement.src = imageUrl;
            imgElement.style.display = 'block';
        } else {
            throw new Error('عکسی در این صفحه یافت نشد.');
        }

    } catch (error) {
        console.error("Error fetching data:", error);
        errorMsg.style.display = 'block';
    } finally {
        loader.style.display = 'none';
    }
}
</script>

</body>
</html>
