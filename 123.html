<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استخراج خودکار اطلاعات محصول</title>
    <style>
        body {
            font-family: Tahoma, Geneva, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            background: #ffffff;
            margin: 30px auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        h2 {
            color: #0071dc;
            text-align: center;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            direction: ltr;
        }
        button {
            background-color: #0071dc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
        }
        button:hover {
            background-color: #0050a0;
        }
        .loading {
            text-align: center;
            color: #666;
            display: none;
            margin: 15px 0;
        }
        .result-box {
            display: none;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            background: #fafafa;
        }
        .product-image {
            max-width: 150px;
            max-height: 150px;
            display: block;
            margin: 0 auto 15px auto;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .product-title {
            font-size: 18px;
            font-weight: bold;
            color: #111;
            margin-bottom: 15px;
            text-align: center;
        }
        .product-link {
            display: block;
            background-color: #ffc220;
            color: #000;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 4px;
            font-weight: bold;
            text-align: center;
            margin: 0 auto;
            max-width: 280px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>استخراج خودکار محصول از Walmart</h2>
    
    <div class="input-group">
        <input type="text" id="walmartUrl" value="https://www.walmart.ca/en/search?q=6000205460099">
        <button id="fetchBtn">یافتن محصول</button>
    </div>

    <div class="loading" id="loader">در حال دریافت و تحلیل اطلاعات...</div>

    <div class="result-box" id="resultCard">
        <img id="pImg" class="product-image" src="" alt="تصویر محصول" style="display: none;">
        <div class="product-title" id="pTitle">عنوان محصول</div>
        <div style="text-align: center;">
            <a id="pLink" class="product-link" href="#" target="_blank">مشاهده محصول در سایت</a>
        </div>
    </div>
</div>

<script>
document.getElementById("fetchBtn").addEventListener("click", async function() {
    const urlInput = document.getElementById("walmartUrl");
    const loader = document.getElementById("loader");
    const resultCard = document.getElementById("resultCard");
    
    const url = urlInput.value.trim();
    
    if (!url) {
        alert("لطفا یک لینک معتبر وارد کنید.");
        return;
    }

    resultCard.style.display = "none";
    loader.style.display = "block";

    // انکود کردن امن آدرس هدف برای ارسال به پروکسی
    const targetUrl = encodeURIComponent(url);
    const proxyUrl = "https://api.allorigins.win/get?url=" + targetUrl;

    try {
        const response = await fetch(proxyUrl);
        if (!response.ok) {
            throw new Error("خطا در پاسخ‌دهی شبکه");
        }
        
        const data = await response.json();
        const htmlContent = data.contents;

        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlContent, "text/html");

        // پیدا کردن تگ a محصول
        const linkElement = doc.querySelector("a[link-identifier]") || doc.querySelector("a[href*='/ip/']");

        if (linkElement) {
            const titleSpan = linkElement.querySelector("span.ld_Ec") || linkElement.querySelector("span");
            let title = "بدون عنوان";
            if (titleSpan) {
                // پاکسازی کامنت‌های HTML از درون عنوان به روش امن
                title = titleSpan.textContent.trim();
            }

            let href = linkElement.getAttribute("href") || "";
            let fullLink = href;
            if (!href.startsWith("http")) {
                fullLink = "https://www.walmart.ca" + href;
            }

            // پیدا کردن عکس محصول
            const imgElement = linkElement.querySelector("img") || doc.querySelector("img");
            const pImg = document.getElementById("pImg");
            
            if (imgElement && imgElement.getAttribute("src")) {
                pImg.src = imgElement.getAttribute("src");
                pImg.style.display = "block";
            } else {
                pImg.style.display = "none";
            }

            document.getElementById("pTitle").innerText = title;
            document.getElementById("pLink").href = fullLink;

            loader.style.display = "none";
            resultCard.style.display = "block";
        } else {
            loader.style.display = "none";
            alert("المان محصول پیدا نشد. ممکن است دسترسی توسط کلودفلر والمارکت مسدود شده باشد.");
        }
    } catch (error) {
        console.error(error);
        loader.style.display = "none";
        alert("خطا در ارتباط با سرور رخ داد.");
    }
});
</script>

</body>
</html>
