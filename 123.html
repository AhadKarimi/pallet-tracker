<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استخراج عکس و عنوان والمارت</title>
    <style>
        body {
            font-family: 'Tahoma', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f4f4f4;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #0071dc;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        button {
            background: #0071dc;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #0058a8;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: #fafafa;
        }
        .product-image {
            max-width: 300px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: block;
            margin: 15px auto;
        }
        .product-title {
            font-size: 1.4em;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
            color: #222;
        }
        .info {
            background: #e6f7ff;
            padding: 12px;
            border-radius: 6px;
            margin: 20px 0;
            font-size: 0.95em;
        }
        pre {
            background: #f8f8f8;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>استخراج عکس و عنوان محصول والمارت</h1>
        <p style="text-align: center; color: #666;">لینک محصول والمارت را وارد کنید (مثال: https://www.walmart.ca/...)</p>
        
        <input type="text" id="urlInput" placeholder="https://www.walmart.ca/en/search?q=6000205460099" value="https://www.walmart.ca/en/ip/green-house-local-strawberries/6000205460099">
        
        <button onclick="extractProduct()">استخراج عکس و عنوان</button>

        <div class="info">
            <strong>نکته:</strong> به دلیل محدودیت CORS مرورگر، از پروکسی استفاده می‌شود. اگر کار نکرد، HTML صفحه را در تب Inspect کپی کنید و در بخش دوم استفاده کنید.
        </div>

        <div id="result" class="result" style="display: none;">
            <h3>نتیجه:</h3>
            <img id="productImage" class="product-image" alt="Product Image">
            <div id="productTitle" class="product-title"></div>
            <button onclick="copyToClipboard()" style="margin-top: 15px; background: #28a745;">کپی عنوان</button>
        </div>

        <hr style="margin: 40px 0;">

        <h3>روش دوم: چسباندن HTML (اگر روش اول کار نکرد)</h3>
        <textarea id="htmlInput" rows="10" style="width:100%; padding:10px; font-family: monospace; font-size:14px;" placeholder="HTML را از Inspect Element اینجا paste کنید..."></textarea>
        <button onclick="extractFromHTML()" style="margin-top:10px;">استخراج از HTML</button>
    </div>

    <script>
        // پروکسی رایگان برای دور زدن CORS
        const CORS_PROXY = "https://api.allorigins.win/raw?url=";

        async function extractProduct() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                alert("لینک را وارد کنید!");
                return;
            }

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'none';

            try {
                const response = await fetch(CORS_PROXY + encodeURIComponent(url));
                if (!response.ok) throw new Error("خطا در دریافت صفحه");
                
                const html = await response.text();
                parseAndShow(html);
            } catch (error) {
                alert("خطا: " + error.message + "\n\nلطفاً HTML را دستی paste کنید.");
                console.error(error);
            }
        }

        function parseAndShow(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");

            // پیدا کردن عنوان
            let title = "";
            const titleSelectors = [
                '[data-automation-id="product-title"]',
                'span[aria-hidden="true"]',
                'h1',
                '.product-name',
                'title'
            ];

            for (let selector of titleSelectors) {
                const el = doc.querySelector(selector);
                if (el && el.textContent.trim()) {
                    title = el.textContent.trim();
                    break;
                }
            }

            // پیدا کردن عکس
            let imgSrc = "";
            const imgSelectors = [
                'img[data-testid="productTileImage"]',
                'img[alt*="Strawberries"]', // بر اساس مثال
                'img[src*="walmartimages"]',
                'meta[property="og:image"]'
            ];

            for (let selector of imgSelectors) {
                const el = doc.querySelector(selector);
                if (el) {
                    imgSrc = el.src || el.getAttribute('content');
                    if (imgSrc) break;
                }
            }

            // نمایش نتیجه
            const resultDiv = document.getElementById('result');
            document.getElementById('productTitle').textContent = title || "عنوان پیدا نشد";
            
            const imgEl = document.getElementById('productImage');
            if (imgSrc) {
                imgEl.src = imgSrc.startsWith('http') ? imgSrc : 'https:' + imgSrc;
                imgEl.style.display = 'block';
            } else {
                imgEl.style.display = 'none';
            }

            resultDiv.style.display = 'block';
        }

        function extractFromHTML() {
            const html = document.getElementById('htmlInput').value.trim();
            if (!html) {
                alert("HTML را paste کنید!");
                return;
            }
            parseAndShow(html);
        }

        function copyToClipboard() {
            const title = document.getElementById('productTitle').textContent;
            if (title) {
                navigator.clipboard.writeText(title).then(() => {
                    alert("عنوان کپی شد: " + title);
                });
            }
        }

        // مثال اولیه
        window.onload = () => {
            // برای تست
            console.log("آماده است. لینک نمونه بارگذاری شد.");
        };
    </script>
</body>
</html>
