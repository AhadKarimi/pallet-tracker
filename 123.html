<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استخراج اطلاعات محصول وال‌مارت</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
            padding: 2rem 1.5rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h1 i {
            color: #0071ce;
        }

        .sub {
            color: #475569;
            margin-bottom: 2rem;
            border-left: 4px solid #0071ce;
            padding-left: 1rem;
            font-size: 0.95rem;
        }

        .input-section {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 20px;
            align-items: flex-end;
        }

        .input-group {
            flex: 2 1 300px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.3rem;
            letter-spacing: 0.3px;
        }

        .input-group input {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid #d1d9e6;
            border-radius: 60px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: white;
        }

        .input-group input:focus {
            outline: none;
            border-color: #0071ce;
            box-shadow: 0 0 0 3px rgba(0, 113, 206, 0.2);
        }

        .btn {
            background: #0071ce;
            border: none;
            color: white;
            padding: 0.7rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #0071ce;
            flex: 0 0 auto;
            height: 48px;
        }

        .btn:hover {
            background: #005bb5;
            border-color: #005bb5;
            transform: scale(1.01);
        }

        .btn:active {
            background: #004a94;
        }

        .btn i {
            font-size: 1rem;
        }

        .btn-outline {
            background: transparent;
            color: #0071ce;
            border: 1px solid #0071ce;
        }

        .btn-outline:hover {
            background: #e6f0ff;
            color: #005bb5;
        }

        .upload-section {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 1rem 1.5rem;
            background: #f1f5f9;
            border-radius: 16px;
            border: 1px dashed #94a3b8;
        }

        .upload-section label {
            font-weight: 500;
            color: #1e293b;
        }

        .upload-section input[type="file"] {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid #d1d9e6;
            border-radius: 40px;
            background: white;
        }

        .result-area {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04);
            border: 1px solid #edf2f7;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: 0.2s;
        }

        .card:hover {
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.07);
        }

        .card-body {
            display: flex;
            flex-wrap: wrap;
            padding: 1.8rem;
            gap: 1.8rem;
        }

        .card-image {
            flex: 0 0 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafcff;
            border-radius: 18px;
            padding: 0.5rem;
        }

        .card-image img {
            max-width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 12px;
            transition: 0.2s;
        }

        .card-image img:not([src]) {
            opacity: 0.3;
        }

        .card-details {
            flex: 1;
            min-width: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .product-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #0b1d2e;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .product-price {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0b1d2e;
            letter-spacing: -0.3px;
            margin: 0.25rem 0 0.5rem;
        }

        .product-price small {
            font-weight: 400;
            font-size: 1rem;
            color: #64748b;
            margin-left: 0.3rem;
        }

        .meta-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.5rem;
            margin: 0.5rem 0 0.2rem;
            color: #334155;
            font-size: 0.9rem;
        }

        .meta-grid span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .meta-grid i {
            color: #0071ce;
            width: 1.1rem;
            text-align: center;
        }

        .rating-stars {
            color: #f59e0b;
            letter-spacing: 1px;
            font-size: 1rem;
        }

        .rating-stars .empty {
            color: #d1d9e6;
        }

        .badge {
            background: #eef2f6;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1e293b;
            display: inline-block;
            margin-top: 0.4rem;
        }

        .badge i {
            color: #0071ce;
            margin-right: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: #64748b;
        }

        .empty-state i {
            font-size: 3.5rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-weight: 500;
            font-size: 1.2rem;
            color: #334155;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #94a3b8;
            text-align: center;
            border-top: 1px solid #e9edf3;
            padding-top: 1.5rem;
        }

        .alert {
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            background: #fee2e2;
            color: #991b1b;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .alert i {
            font-size: 1.2rem;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 640px) {
            .container {
                padding: 1.2rem 0.8rem;
            }
            .card-body {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 1.5rem;
            }
            .card-image {
                flex: 0 0 auto;
                width: 100%;
                max-width: 220px;
            }
            .meta-grid {
                justify-content: center;
            }
            .input-section {
                flex-direction: column;
                align-items: stretch;
            }
            .btn {
                justify-content: center;
            }
            .upload-section {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-box-open"></i> استخراج‌کننده محصول وال‌مارت</h1>
    <div class="sub">
        وارد کردن لینک جستجو <strong>یا</strong> آپلود فایل HTML صفحه وال‌مارت
    </div>

    <!-- بخش هشدار در صورت خطا -->
    <div id="errorAlert" class="alert hidden">
        <i class="fas fa-circle-exclamation"></i>
        <span id="errorMessage">خطا در دریافت اطلاعات</span>
    </div>

    <!-- بخش ورودی لینک -->
    <div class="input-section">
        <div class="input-group">
            <label for="urlInput"><i class="fas fa-link"></i> لینک جستجوی وال‌مارت</label>
            <input type="url" id="urlInput" placeholder="مثلاً https://www.walmart.ca/en/search?q=6000205460099" value="https://www.walmart.ca/en/search?q=6000205460099">
        </div>
        <button class="btn" id="fetchBtn"><i class="fas fa-magnifying-glass"></i> دریافت از لینک</button>
    </div>

    <!-- بخش آپلود فایل -->
    <div class="upload-section">
        <label for="fileInput"><i class="fas fa-upload"></i> یا فایل HTML را آپلود کنید:</label>
        <input type="file" id="fileInput" accept=".html,.htm">
        <button class="btn btn-outline" id="uploadBtn"><i class="fas fa-file-import"></i> پردازش فایل</button>
    </div>

    <div id="resultContainer" class="result-area">
        <div class="empty-state">
            <i class="fas fa-cart-plus"></i>
            <h3>محصولی بارگذاری نشده</h3>
            <p style="margin-top: 0.5rem; color: #94a3b8;">از لینک یا فایل HTML برای استخراج اطلاعات استفاده کنید.</p>
        </div>
    </div>

    <div class="footer-note">
        <i class="fas fa-code"></i> داده‌ها با الهام از ساختار inspect element وال‌مارت • تصویر و عنوان و قیمت و امتیاز
    </div>
</div>

<script>
    (function() {
        // ---- تابع استخراج از المنت ----
        function extractFromElement(element) {
            // ---- تصویر ----
            const imgElement = element.querySelector('img[data-testid="productTileImage"]');
            let imageUrl = '';
            if (imgElement) {
                imageUrl = imgElement.getAttribute('src') || '';
                if (imageUrl.startsWith('//')) {
                    imageUrl = 'https:' + imageUrl;
                }
            }

            // ---- عنوان ----
            const titleElement = element.querySelector('[data-automation-id="product-title"]');
            let title = '';
            if (titleElement) {
                title = titleElement.textContent.trim();
            } else {
                const linkTitle = element.querySelector('a[link-identifier] span');
                if (linkTitle) title = linkTitle.textContent.trim();
            }

            // ---- قیمت ----
            const priceElement = element.querySelector('[data-automation-id="product-price"]');
            let price = '';
            if (priceElement) {
                const priceSpan = priceElement.querySelector('.b.black');
                if (priceSpan) {
                    price = priceSpan.textContent.trim();
                } else {
                    price = priceElement.textContent.trim();
                }
            }

            // ---- امتیاز و تعداد نظرات ----
            let rating = '';
            let reviewCount = '';
            const ratingContainer = element.querySelector('[data-testid="product-ratings"]');
            if (ratingContainer) {
                const ratingValue = ratingContainer.getAttribute('data-value');
                if (ratingValue) {
                    const num = parseFloat(ratingValue);
                    if (!isNaN(num)) rating = num.toFixed(1);
                }
            }

            const reviewElement = element.querySelector('[data-testid="product-reviews"]');
            if (reviewElement) {
                reviewCount = reviewElement.textContent.trim() || '';
            }

            // ---- آیتم آیدی ----
            const itemId = element.getAttribute('data-item-id') || '';

            return {
                image: imageUrl,
                title: title || 'بدون عنوان',
                price: price || '---',
                rating: rating,
                reviews: reviewCount,
                itemId: itemId
            };
        }

        // ---- تابع استخراج از HTML ----
        function extractProductData(htmlString) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlString, 'text/html');

            const itemStack = doc.querySelector('[data-testid="item-stack"]');
            if (!itemStack) {
                const fallbackItem = doc.querySelector('[data-item-id]');
                if (!fallbackItem) return null;
                return extractFromElement(fallbackItem);
            }

            const firstItem = itemStack.querySelector('[data-item-id]');
            if (!firstItem) return null;

            return extractFromElement(firstItem);
        }

        // ---- تابع نمایش کارت ----
        function renderProductCard(data) {
            const container = document.getElementById('resultContainer');
            const alertBox = document.getElementById('errorAlert');
            alertBox.classList.add('hidden');

            if (!data) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-triangle-exclamation" style="color: #eab308;"></i>
                        <h3>داده‌ای یافت نشد</h3>
                        <p style="margin-top: 0.5rem; color: #94a3b8;">ساختار صفحه ممکن است تغییر کرده باشد یا فایل/لینک معتبر نیست.</p>
                    </div>
                `;
                return;
            }

            // ساخت ستاره‌ها
            let starsHtml = '';
            const ratingNum = parseFloat(data.rating) || 0;
            const fullStars = Math.floor(ratingNum);
            const hasHalf = (ratingNum - fullStars) >= 0.5;
            for (let i = 0; i < 5; i++) {
                if (i < fullStars) {
                    starsHtml += '<i class="fas fa-star"></i>';
                } else if (i === fullStars && hasHalf) {
                    starsHtml += '<i class="fas fa-star-half-alt"></i>';
                } else {
                    starsHtml += '<i class="far fa-star" style="color: #d1d9e6;"></i>';
                }
            }

            const cardHtml = `
                <div class="card">
                    <div class="card-body">
                        <div class="card-image">
                            <img src="${data.image || 'https://via.placeholder.com/200?text=No+Image'}" 
                                 alt="${data.title}" 
                                 onerror="this.src='https://via.placeholder.com/200?text=Image+Not+Found'">
                        </div>
                        <div class="card-details">
                            <div class="product-title">${data.title}</div>
                            <div class="product-price">${data.price} <small>CAD</small></div>
                            <div class="meta-grid">
                                <span><i class="fas fa-barcode"></i> کد: ${data.itemId || '---'}</span>
                                ${data.rating ? `<span><i class="fas fa-star" style="color: #f59e0b;"></i> ${data.rating}</span>` : ''}
                                ${data.reviews ? `<span><i class="fas fa-comment"></i> ${data.reviews} نظر</span>` : ''}
                            </div>
                            <div class="rating-stars" style="margin: 0.3rem 0 0.2rem;">
                                ${starsHtml}
                                ${data.rating ? `<span style="font-weight: 500; color: #1e293b; margin-left: 0.4rem;">${data.rating}</span>` : ''}
                            </div>
                            <div class="badge"><i class="fas fa-tag"></i> محصول یافت شده</div>
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = cardHtml;
        }

        // ---- نمایش خطا ----
        function showError(message) {
            const alertBox = document.getElementById('errorAlert');
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.textContent = message || 'خطا در دریافت اطلاعات';
            alertBox.classList.remove('hidden');

            const container = document.getElementById('resultContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-circle-exclamation" style="color: #dc2626;"></i>
                    <h3>خطا</h3>
                    <p style="margin-top: 0.5rem; color: #94a3b8;">${message || 'لطفاً روش دیگری را امتحان کنید (آپلود فایل).'}</p>
                </div>
            `;
        }

        // ---- دریافت از لینک با پروکسی‌های مختلف ----
        async function fetchProductFromUrl(url) {
            const container = document.getElementById('resultContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-spinner fa-pulse" style="color: #0071ce;"></i>
                    <h3>در حال دریافت اطلاعات...</h3>
                </div>
            `;

            // لیست پروکسی‌ها (با اولویت)
            const proxies = [
                `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
                `https://corsproxy.io/?${encodeURIComponent(url)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
            ];

            let lastError = null;

            for (const proxyUrl of proxies) {
                try {
                    const response = await fetch(proxyUrl, {
                        headers: { 'Content-Type': 'application/json' }
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const result = await response.json();
                    let htmlContent = '';

                    // پروکسی‌های مختلف فرمت متفاوتی دارند
                    if (result.contents) {
                        htmlContent = result.contents;
                    } else if (result.data) {
                        htmlContent = result.data;
                    } else if (typeof result === 'string') {
                        htmlContent = result;
                    } else {
                        // تلاش برای پیدا کردن محتوا در هر کلید
                        for (const key in result) {
                            if (typeof result[key] === 'string' && result[key].length > 1000) {
                                htmlContent = result[key];
                                break;
                            }
                        }
                    }

                    if (!htmlContent || htmlContent.length < 500) {
                        throw new Error('محتوای دریافتی ناقص است');
                    }

                    const extractedData = extractProductData(htmlContent);
                    if (extractedData) {
                        renderProductCard(extractedData);
                        return; // موفقیت
                    } else {
                        throw new Error('ساختار صفحه قابل تشخیص نیست');
                    }

                } catch (error) {
                    lastError = error;
                    console.warn(`پروکسی ${proxyUrl} ناموفق:`, error.message);
                    // ادامه با پروکسی بعدی
                }
            }

            // اگر همه پروکسی‌ها ناموفق بودند
            showError('دریافت از لینک ممکن نیست. لطفاً فایل HTML را آپلود کنید. (' + (lastError?.message || 'خطای ناشناخته') + ')');
        }

        // ---- پردازش فایل آپلود شده ----
        function processUploadedFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const htmlContent = e.target.result;
                    if (!htmlContent || htmlContent.length < 500) {
                        showError('فایل انتخاب شده معتبر نیست یا خالی است.');
                        return;
                    }
                    const extractedData = extractProductData(htmlContent);
                    if (extractedData) {
                        renderProductCard(extractedData);
                        // پاک کردن خطاها
                        document.getElementById('errorAlert').classList.add('hidden');
                    } else {
                        showError('ساختار فایل مطابق با صفحه محصول وال‌مارت نیست.');
                    }
                } catch (error) {
                    showError('خطا در خواندن فایل: ' + error.message);
                }
            };
            reader.onerror = function() {
                showError('خطا در خواندن فایل.');
            };
            reader.readAsText(file);
        }

        // ---- رویدادها ----
        document.getElementById('fetchBtn').addEventListener('click', function() {
            const urlInput = document.getElementById('urlInput');
            let rawUrl = urlInput.value.trim();
            if (!rawUrl) {
                alert('لطفاً یک لینک معتبر وارد کنید.');
                return;
            }

            try {
                const urlObj = new URL(rawUrl);
                fetchProductFromUrl(urlObj.href);
            } catch (_) {
                if (!rawUrl.startsWith('http://') && !rawUrl.startsWith('https://')) {
                    rawUrl = 'https://' + rawUrl;
                }
                try {
                    const urlObj = new URL(rawUrl);
                    fetchProductFromUrl(urlObj.href);
                } catch (e) {
                    alert('لینک وارد شده معتبر نیست.');
                }
            }
        });

        document.getElementById('uploadBtn').addEventListener('click', function() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files || fileInput.files.length === 0) {
                alert('لطفاً ابتدا یک فایل HTML انتخاب کنید.');
                return;
            }
            processUploadedFile(fileInput.files[0]);
        });

        // آپلود با انتخاب فایل (خودکار)
        document.getElementById('fileInput').addEventListener('change', function() {
            if (this.files && this.files.length > 0) {
                processUploadedFile(this.files[0]);
            }
        });

        // بارگذاری خودکار با مقدار پیش‌فرض
        window.addEventListener('DOMContentLoaded', function() {
            const defaultUrl = document.getElementById('urlInput').value;
            if (defaultUrl) {
                fetchProductFromUrl(defaultUrl);
            }
        });

    })();
</script>

</body>
</html>
