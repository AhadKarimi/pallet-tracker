<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استخراج اطلاعات محصول والمارت</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f1f4f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            max-width: 720px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 28px 24px 32px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            transition: 0.2s;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: #1a2a3a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .subhead {
            color: #4a5a6a;
            font-size: 0.95rem;
            margin-top: -4px;
            margin-bottom: 24px;
            border-left: 4px solid #0071dc;
            padding-left: 14px;
            background: #f8faff;
            border-radius: 0 12px 12px 0;
            line-height: 1.5;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
        }
        .input-group input {
            flex: 1;
            min-width: 200px;
            padding: 14px 18px;
            border: 1px solid #d9e1e9;
            border-radius: 60px;
            font-size: 0.95rem;
            background: #fafcff;
            transition: 0.2s;
            outline: none;
        }
        .input-group input:focus {
            border-color: #0071dc;
            box-shadow: 0 0 0 3px rgba(0,113,220,0.15);
            background: white;
        }
        .input-group button {
            background: #0071dc;
            border: none;
            color: white;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }
        .input-group button:hover {
            background: #005bbf;
            transform: scale(0.97);
        }
        .input-group button:active {
            background: #004a9e;
        }
        .example {
            font-size: 0.85rem;
            color: #3d6b99;
            background: #eef4fa;
            padding: 6px 16px;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 18px;
            cursor: default;
            user-select: all;
        }
        .product-preview {
            background: #fafdff;
            border-radius: 28px;
            padding: 24px 20px 20px;
            border: 1px solid #e9edf2;
            transition: 0.2s;
            margin-top: 8px;
        }
        .product-preview.loading {
            opacity: 0.5;
            pointer-events: none;
        }
        .product-row {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: flex-start;
        }
        .image-wrapper {
            flex: 0 0 140px;
            background: white;
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.02);
            border: 1px solid #eef2f6;
        }
        .image-wrapper img {
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            object-fit: contain;
            display: block;
            border-radius: 12px;
            background: #f6f9fe;
        }
        .info {
            flex: 1;
            min-width: 180px;
        }
        .product-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0b1a2a;
            line-height: 1.3;
            margin: 0 0 8px 0;
        }
        .product-price {
            font-size: 2rem;
            font-weight: 700;
            color: #1e2a3a;
            letter-spacing: -0.3px;
            margin: 6px 0 12px 0;
        }
        .product-price small {
            font-weight: 400;
            font-size: 1rem;
            color: #4f6a84;
            margin-left: 6px;
        }
        .rating-block {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 16px;
            background: #f2f7fd;
            padding: 8px 14px 8px 12px;
            border-radius: 40px;
            width: fit-content;
        }
        .stars {
            color: #f5b81b;
            font-size: 1.1rem;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
        }
        .stars i {
            font-style: normal;
        }
        .stars .empty {
            color: #cbd5e1;
        }
        .review-count {
            color: #2a4b6e;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .extra-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 28px;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px dashed #dce3ec;
            font-size: 0.9rem;
            color: #1d3853;
        }
        .extra-meta span {
            background: #f2f6fc;
            padding: 2px 14px 2px 10px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .badge {
            background: #d2e4ff;
            color: #004b9e;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }
        .error-msg {
            background: #fff0ee;
            border: 1px solid #ffbab3;
            padding: 14px 20px;
            border-radius: 40px;
            color: #b33a2e;
            font-weight: 500;
            display: none;
            margin-top: 12px;
        }
        .error-msg.show {
            display: block;
        }
        .footer-note {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #5f748c;
            text-align: center;
            border-top: 1px solid #e8edf4;
            padding-top: 18px;
        }
        @media (max-width: 500px) {
            .card { padding: 20px 16px; }
            .product-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🛒 والمارت اسنپر</h1>
    <div class="subhead">
        با وارد کردن لینک جستجوی والمارت، عنوان، قیمت، تصویر و امتیاز محصول اول را بگیر.
    </div>

    <!-- ورودی لینک -->
    <div class="input-group">
        <input type="text" id="urlInput" placeholder="لینک جستجوی والمارت ..." value="https://www.walmart.ca/en/search?q=6000205460099">
        <button id="fetchBtn">🔍 استخراج</button>
    </div>

    <div class="example" onclick="document.getElementById('urlInput').value=this.innerText;document.getElementById('fetchBtn').click()">
        https://www.walmart.ca/en/search?q=6000205460099
    </div>

    <!-- محل نمایش اطلاعات -->
    <div id="productDisplay" class="product-preview">
        <div style="text-align: center; color: #7f8fa3; padding: 16px 0;">
            <span style="font-size: 2rem; display: block;">🔎</span>
            <span style="font-weight: 400;">لینک جستجو را وارد کن و دکمه استخراج را بزن.</span>
        </div>
    </div>

    <div id="errorBox" class="error-msg">⚠️ خطا در دریافت اطلاعات. لینک را بررسی کن.</div>
    <div class="footer-note">اطلاعات از المنت‌های صفحه والمارت استخراج میشود.</div>
</div>

<script>
    (function() {
        const urlInput = document.getElementById('urlInput');
        const fetchBtn = document.getElementById('fetchBtn');
        const display = document.getElementById('productDisplay');
        const errorBox = document.getElementById('errorBox');

        // تابع استخراج اطلاعات از HTML
        function extractProductInfo(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            // پیدا کردن محصول اول (بر اساس ساختار داده شده)
            const itemContainer = doc.querySelector('[data-item-id]'); 
            if (!itemContainer) {
                throw new Error('محصولی یافت نشد (data-item-id وجود ندارد)');
            }

            // ---- عنوان ----
            const titleEl = itemContainer.querySelector('[data-automation-id="product-title"]');
            const title = titleEl ? titleEl.textContent.trim() : 'بدون عنوان';

            // ---- قیمت ----
            const priceEl = itemContainer.querySelector('[data-automation-id="product-price"] .b');
            let price = 'نامشخص';
            if (priceEl) {
                price = priceEl.textContent.trim();
            } else {
                // fallback: هر قیمتی که داخل product-price هست
                const priceContainer = itemContainer.querySelector('[data-automation-id="product-price"]');
                if (priceContainer) {
                    const raw = priceContainer.textContent.trim();
                    const match = raw.match(/\$\d+\.\d{2}/);
                    if (match) price = match[0];
                }
            }

            // ---- تصویر ----
            const imgEl = itemContainer.querySelector('img[src*="walmartimages"]');
            let imageUrl = '';
            if (imgEl) {
                imageUrl = imgEl.getAttribute('src') || '';
                // اگر تصویر نسبی بود کاملش کن
                if (imageUrl && imageUrl.startsWith('//')) {
                    imageUrl = 'https:' + imageUrl;
                } else if (imageUrl && !imageUrl.startsWith('http')) {
                    imageUrl = 'https://i5.walmartimages.com' + (imageUrl.startsWith('/') ? '' : '/') + imageUrl;
                }
            }

            // ---- امتیاز و تعداد نظرات ----
            let rating = 'نامشخص';
            let reviewCount = '';
            const ratingContainer = itemContainer.querySelector('[data-testid="product-ratings"]');
            if (ratingContainer) {
                const val = ratingContainer.getAttribute('data-value');
                if (val) {
                    rating = parseFloat(val).toFixed(2);
                } else {
                    // شمارش ستاره‌ها
                    const filledStars = ratingContainer.querySelectorAll('.ld-StarFill').length;
                    const totalStars = ratingContainer.querySelectorAll('[class*="ld-Star"]').length || 5;
                    rating = filledStars + '/' + totalStars;
                }
            }
            const reviewEl = itemContainer.querySelector('[data-testid="product-reviews"]');
            if (reviewEl) {
                reviewCount = reviewEl.textContent.trim();
            }

            // ---- (اختیاری) شناسه محصول ----
            const itemId = itemContainer.getAttribute('data-item-id') || '';

            return {
                title,
                price,
                imageUrl,
                rating,
                reviewCount,
                itemId
            };
        }

        // تابع اصلی واکشی
        async function fetchProductData(url) {
            try {
                // 1. واکشی محتوای صفحه
                const response = await fetch(url, {
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
                    }
                });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const html = await response.text();

                // 2. استخراج اطلاعات
                const info = extractProductInfo(html);

                // 3. نمایش
                renderProduct(info);
                errorBox.classList.remove('show');
            } catch (error) {
                console.error('Error:', error);
                errorBox.textContent = '⚠️ خطا: ' + (error.message || 'مشکل در دریافت یا پردازش صفحه');
                errorBox.classList.add('show');
                display.innerHTML = `<div style="text-align:center; color:#5a6f85; padding:20px;">
                    <span style="font-size:1.8rem;">⚠️</span><br>
                    <span>خطا در استخراج. لطفاً لینک را بررسی کنید.</span>
                </div>`;
            }
        }

        // رندر اطلاعات در کارت
        function renderProduct(info) {
            const { title, price, imageUrl, rating, reviewCount, itemId } = info;

            // ستاره‌ها (ساده)
            let starsHtml = '';
            if (rating && !isNaN(parseFloat(rating)) && rating.includes('/') === false) {
                const num = parseFloat(rating);
                const full = Math.floor(num);
                const half = num - full >= 0.5 ? 1 : 0;
                const empty = 5 - full - half;
                starsHtml = '⭐'.repeat(full) + (half ? '✨' : '') + '☆'.repeat(empty);
            } else if (rating && rating.includes('/')) {
                // مثلاً 3/5
                const parts = rating.split('/');
                if (parts.length === 2) {
                    const filled = parseInt(parts[0]) || 0;
                    const total = parseInt(parts[1]) || 5;
                    starsHtml = '⭐'.repeat(filled) + '☆'.repeat(total - filled);
                } else {
                    starsHtml = '⭐'.repeat(3) + '☆'.repeat(2); // fallback
                }
            } else {
                starsHtml = '⭐'.repeat(3) + '☆'.repeat(2);
            }

            const displayRating = (rating && !isNaN(parseFloat(rating)) && rating.includes('/') === false) 
                ? parseFloat(rating).toFixed(2) 
                : rating;

            display.innerHTML = `
                <div class="product-row">
                    <div class="image-wrapper">
                        <img src="${imageUrl || 'https://via.placeholder.com/200?text=no+image'}" 
                             alt="${title}" 
                             onerror="this.src='https://via.placeholder.com/200?text=no+image'">
                    </div>
                    <div class="info">
                        <div class="product-title">${title}</div>
                        <div class="product-price">${price} <small>CAD</small></div>
                        <div class="rating-block">
                            <span class="stars">${starsHtml}</span>
                            <span class="review-count">${reviewCount || 'بدون نظر'} </span>
                            <span class="badge">${displayRating || '—'}</span>
                        </div>
                        <div class="extra-meta">
                            <span>🆔 <strong>${itemId || 'نامشخص'}</strong></span>
                            <span>📦 والمارت کانادا</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // هندلر کلیک
        async function handleFetch() {
            let rawUrl = urlInput.value.trim();
            if (!rawUrl) {
                errorBox.textContent = '⚠️ لطفاً لینک جستجوی والمارت را وارد کنید.';
                errorBox.classList.add('show');
                return;
            }

            // اگر لینک بدون پروتکل بود
            if (!rawUrl.startsWith('http://') && !rawUrl.startsWith('https://')) {
                rawUrl = 'https://' + rawUrl;
            }

            // نمایش حالت بارگذاری
            display.innerHTML = `<div style="text-align:center; padding: 24px 0; color: #2d577c;">
                <span style="display:block; font-size:2.2rem;">⏳</span>
                <span>در حال دریافت اطلاعات از والمارت ...</span>
            </div>`;
            errorBox.classList.remove('show');

            await fetchProductData(rawUrl);
        }

        // رویدادها
        fetchBtn.addEventListener('click', handleFetch);
        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleFetch();
        });

        // بارگذاری اولیه با لینک نمونه
        window.addEventListener('load', () => {
            // اگر مقدار ورودی خالی نباشه، خودش اجرا میشه
            if (urlInput.value.trim()) {
                handleFetch();
            }
        });

    })();
</script>

</body>
</html>
