<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استخراج و نمایش عکس از لینک والمارت</title>
    <style>
        body { font-family: Tahoma, sans-serif; background: #f0f2f5; text-align: center; padding: 40px; }
        .box { max-width: 650px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; text-align: left; direction: ltr; }
        button { padding: 12px 25px; background: #0071dc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; font-weight: bold; }
        button:hover { background: #0050a0; }
        .image-box { margin-top: 25px; min-height: 250px; display: flex; align-items: center; justify-content: center; border: 2px dashed #ddd; border-radius: 4px; }
        img { max-width: 100%; max-height: 400px; border-radius: 4px; }
        .error { color: red; font-weight: bold; }
        .loading { color: #666; }
    </style>
</head>
<body>
    <div class="box">
        <h2>استخراج داینامیک عکس از لینک والمارت</h2>
        <p>لینک سرچ یا صفحه محصول والمارت را وارد کنید:</p>
        
        <input type="text" id="walmartUrl" placeholder="https://www.walmart.ca/en/search?q=..." value="https://www.walmart.ca/en/search?q=6000205460099">
        <br>
        <button onclick="fetchWalmartImage()">یافتن و نمایش عکس</button>
        
        <div class="image-box" id="resultContainer">
            <span style="color: #888;">تصویر پس از پردازش اینجا نمایش داده می‌شود</span>
        </div>
    </div>

    <script>
        async function fetchWalmartImage() {
            const inputUrl = document.getElementById('walmartUrl').value.trim();
            const container = document.getElementById('resultContainer');
            
            if(!inputUrl) {
                alert('لطفاً لینک را وارد کنید');
                return;
            }
            
            container.innerHTML = '<span class="loading">در حال بررسی صفحه والمارت و استخراج عکس (ممکن است چند ثانیه طول بکشد)...</span>';
            
            // ارسال لینک صفحه به ای‌پ‌آی ورسل
            const apiUrl = '/api/get-image?pageUrl=' + encodeURIComponent(inputUrl);
            
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(errText || 'خطا در دریافت پاسخ از سرور');
                }
                
                // دریافت تصویر به صورت Blob و ایجاد لینک موقت برای نمایش آن
                const blob = await response.blob();
                const objectURL = URL.createObjectURL(blob);
                container.innerHTML = `<img src="${objectURL}" alt="Walmart Product">`;
            } catch (error) {
                console.error(error);
                container.innerHTML = `<span class="error">خطا: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
